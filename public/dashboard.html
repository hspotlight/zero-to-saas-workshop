<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Link in Bio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-page">
  <header class="app-header">
    <span class="logo">Link in Bio</span>
    <nav>
      <a id="profile-link" href="#" target="_blank" class="btn-ghost">View my page</a>
      <span id="user-email" class="user-email"></span>
      <button id="logout-btn" class="btn-ghost">Sign out</button>
    </nav>
  </header>

  <main class="dashboard">
    <!-- Analytics bar -->
    <section class="analytics-bar">
      <div class="stat">
        <span class="stat-value" id="stat-profile-views">—</span>
        <span class="stat-label">Profile views</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-total-clicks">—</span>
        <span class="stat-label">Total link clicks</span>
      </div>
    </section>

    <!-- Links management -->
    <section class="section">
      <h2>Your Links</h2>
      <div id="links-error" class="error-message" style="display:none;"></div>
      <div id="links-list" class="links-list"></div>

      <form id="add-link-form" class="add-link-form">
        <h3>Add a link</h3>
        <div class="form-row">
          <label>
            Title
            <input type="text" id="new-link-title" required placeholder="My Website" maxlength="100" />
          </label>
          <label>
            URL
            <input type="url" id="new-link-url" required placeholder="https://example.com" />
          </label>
          <label>
            Icon <small>(emoji or image URL)</small>
            <input type="text" id="new-link-icon" placeholder="🌐" maxlength="200" />
          </label>
        </div>
        <button type="submit" class="btn-primary">Add link</button>
      </form>
    </section>

    <!-- Profile settings -->
    <section class="section">
      <h2>Profile</h2>
      <div id="profile-error" class="error-message" style="display:none;"></div>
      <form id="profile-form" class="profile-form">
        <label>
          Display name
          <input type="text" id="profile-display-name" maxlength="100" />
        </label>
        <label>
          Bio <small>(160 characters max)</small>
          <textarea id="profile-bio" rows="3" maxlength="160"></textarea>
        </label>
        <label>
          Profile photo URL
          <input type="url" id="profile-photo-url" placeholder="https://..." />
        </label>
        <button type="submit" class="btn-primary">Save Profile</button>
      </form>
    </section>
  </main>

  <!-- Edit link modal -->
  <div id="edit-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h3>Edit Link</h3>
      <form id="edit-form">
        <input type="hidden" id="edit-link-id" />
        <label>
          Title
          <input type="text" id="edit-link-title" required maxlength="100" />
        </label>
        <label>
          URL
          <input type="url" id="edit-link-url" required />
        </label>
        <label>
          Icon <small>(emoji or image URL)</small>
          <input type="text" id="edit-link-icon" maxlength="200" />
        </label>
        <div class="modal-actions">
          <button type="button" id="edit-cancel" class="btn-ghost">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="utils.js"></script>
  <script src="username.js"></script>
  <script src="login.js"></script>
  <script src="profile.js"></script>
  <script src="links.js"></script>
  <script src="analytics.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
